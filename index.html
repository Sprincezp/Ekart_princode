<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pincode Serviceability Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="search-card">
        <h1><i class="fa-solid fa-location-dot" style="color: var(--primary);"></i> Pincode Checker</h1>
        
        <div class="input-group">
            <input type="text" id="pincodeInput" placeholder="Enter 6-digit Pincode" maxlength="6">
            <button onclick="checkPincode()" id="searchBtn">
                <span id="btnText">Search</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>
        <div id="errorMsg" class="error-msg">Please enter a valid 6-digit number</div>
    </div>

    <div id="resultContainer">
        </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
